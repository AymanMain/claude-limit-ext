name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run release:validate
      - run: npm run package:all
      - uses: actions/upload-artifact@v4
        with:
          name: store-packages
          path: release/**/*.zip
